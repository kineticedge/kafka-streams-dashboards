  kafka-broker:
    image: apache/kafka:4.1.1
    container_name: ksd-kafka-broker
    hostname: kafka-broker
#    depends_on:
#      keycloak:
#        condition: service_healthy
    environment:
      # Cluster setup
      CLUSTER_ID: MkQzNzQ1NTk2OTJmNDAxZA
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 9223372036854775807
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Kraft controller setup
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER

      # Listeners
      KAFKA_LISTENERS: EXTERNAL_SASL://0.0.0.0:9092,BROKER://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL_SASL://localhost:9092,BROKER://kafka-broker:9093,CONTROLLER://kafka-broker:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL_SASL:SASL_PLAINTEXT,BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT

      # SASL/OAuth configuration
      KAFKA_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_LISTENER_NAME_EXTERNAL__SASL_SASL_ENABLED_MECHANISMS: OAUTHBEARER


      KAFKA_LISTENER_NAME_EXTERNAL__SASL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_EXTERNAL__SASL_SASL_OAUTHBEARER_JWT_VALIDATOR_CLASS: org.apache.kafka.common.security.oauthbearer.BrokerJwtValidator
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs

      KAFKA_LISTENER_NAME_EXTERNAL__SASL_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka
      KAFKA_LISTENER_NAME_EXTERNAL__SASL_SASL_OAUTHBEARER_EXPECTED_ISSUER: http://localhost:8080/realms/master

      # THIS IS NEEDED !!!! AND NOT WITH LISTERNNAE
      #KAFKA_SASL_OAUTHBEARER_JWT_VALIDATOR_CLASS: org.apache.kafka.common.security.oauthbearer.BrokerJwtValidator

      #KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka

      #KAFKA_SASL_OAUTHBEARER_EXPECTED_ISSUER: http://localhost:8080/realms/master

      KAFKA_SASL_OAUTHBEARER_PRINCIPAL_CLAIM_NAME: "client_id"


# these are all failed attempts
      #KAFKA_LISTENER_NAME_EXTERNAL__SASL_OAUTHBEARER_JWT_VALIDATOR_CLASS: xxxx_org.apache.kafka.common.security.oauthbearer.BrokerJwtValidator
      #KAFKA_LISTENER_NAME_EXTERNAL__SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs_LLLLLLLLLL
      #KAFKA_LISTENER_NAME_EXTERNAL_SASL_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka_really
      #KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka_yyy
      #KAFKA_LISTENER_NAME_EXTERNAL__SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka_zzz

  #BrokerJwtValidator
