---

networks:
  default:
    external: true
    name: ksd

volumes:
  ct0: {}
  bk1: {}
  bk2: {}
  bk3: {}

services:

  keycloak:
    image: keycloak/keycloak:24.0.4
    container_name: ${COMPOSE_PROJECT_NAME}-keycloak
    hostname: keycloak
    healthcheck:
      test: cat /proc/1/status | grep State
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 3
    command: [ "start-dev", "--import-realm", "--https-key-store-password=broker_secret", "--https-key-store-file=/keycloak.keystore.jks", "--verbose" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloak
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./secrets/keycloak.keystore.jks:/keycloak.keystore.jks
      - ./realms/:/opt/keycloak/data/import/

  keycloak-init:
    image: keycloak/keycloak:24.0.4
    container_name: ${COMPOSE_PROJECT_NAME}-keycloak-init
    hostname: keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/opt/keycloak-init/keycloak-init.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: master
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloak
    volumes:
      - ./keycloak-init.sh:/opt/keycloak-init/keycloak-init.sh:ro

  sasl-controller-0:
    image: apache/kafka:${VERSION}
    hostname: sasl-controller-0
    container_name: ${COMPOSE_PROJECT_NAME}-sasl-controller-0
    stop_grace_period: 120s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://localhost:7072/jolokia/read/kafka.controller:type=KafkaController,name=ActiveControllerCount/Value' | grep -Eq '\"value\"[[:space:]]*:[[:space:]]*[01]([,}])'"
        ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
    volumes:
      - ct0:/var/lib/kafka/data
      - ../ja:/opt/ja
      - ./config:/opt/config
      - ./secrets:/etc/kafka/secrets
    environment:
      CLUSTER_ID: "0000000000000000000000"
      KAFKA_LISTENERS: CONTROLLER://:9091
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_PLAINTEXT,EXTERNAL_SSL:SASL_SSL,LOCALHOST:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@sasl-controller-0:9091
      KAFKA_NODE_ID: 0
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_SSL_KEYSTORE_FILENAME: sasl-controller-0.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka.key
      KAFKA_SSL_KEY_CREDENTIALS: kafka.key
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: kafka.key
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.server.truststore.jks
#      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: User:kafka-admin;User:kafka-broker;User:kafka-broker-v2;User:app-ui
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
      KAFKA_OPTS: >-
        -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf
        -Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:8080/realms/master/protocol/openid-connect/certs,http://keycloak:8080/realms/master/protocol/openid-connect/token,http://localhost:8080/realms/master/protocol/openid-connect/certs,http://localhost:8080/realms/master/protocol/openid-connect/token 
        -javaagent:/opt/ja/jmx_prometheus_javaagent.jar=7071:/opt/config/kafka-config.yml 
        -javaagent:/opt/ja/jolokia-jvm.jar=port=7072,host=*
        -Djavax.net.debug=ssl:trustmanager,session,handshake:verbose
      KAFKA_LOG4J_OPTS: "-Dlog4j2.configurationFile=file:/opt/config/log4j2.yaml"

  sasl-broker-1:
    image: apache/kafka:${VERSION}
    hostname: sasl-broker-1
    container_name: ${COMPOSE_PROJECT_NAME}-sasl-broker-1
    stop_grace_period: 120s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://localhost:7072/jolokia/read/kafka.server:type=KafkaServer,name=BrokerState/Value' | grep -Eq '\"value\"[[:space:]]*:[[:space:]]*[34]([,}])'"
        ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      sasl-controller-0:
        condition: service_healthy
    ports:
      - "9092:19092"
      - "19092:19092"
    volumes:
      - bk1:/var/lib/kafka/data
      - ../ja:/opt/ja
      - ./config:/opt/config
      - ./secrets:/etc/kafka/secrets/
    environment:
      CLUSTER_ID: "0000000000000000000000"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL_SSL:SASL_SSL,INTERNAL:SASL_PLAINTEXT,LOCALHOST:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://sasl-broker-1:9092,EXTERNAL_SSL://sasl-broker-1:9093,LOCALHOST://localhost:19092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@sasl-controller-0:9091
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 500
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_SSL_KEYSTORE_FILENAME: sasl-broker-1.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka.key
      KAFKA_SSL_KEY_CREDENTIALS: kafka.key
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: kafka.key
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.server.truststore.jks
#      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: User:kafka-admin;User:kafka-broker;User:kafka-broker-v2;User:app-ui
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512,OAUTHBEARER
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
      KAFKA_AUTO_INCLUDE_JMX_REPORTER: 'false'
      KAFKA_METRIC_REPORTERS: org.apache.kafka.common.metrics.JmxReporter
      KAFKA_LOG4J_OPTS: "-Dlog4j2.configurationFile=file:/opt/config/log4j2.yaml"
      #
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      KAFKA_SASL_OAUTHBEARER_SCOPE_CLAIM: scope 
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_OAUTHBEARER_SUB_CLAIM_NAME: sub
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler 
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_SASL_OAUTHBEARER_JWT_VALIDATOR_CLASS: org.apache.kafka.common.security.oauthbearer.BrokerJwtValidator
      KAFKA_SASL_OAUTHBEARER_PRINCIPAL_CLAIM_NAME: client_id
      KAFKA_OPTS: >-
        -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf
        -Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:8080/realms/master/protocol/openid-connect/certs,http://keycloak:8080/realms/master/protocol/openid-connect/token,http://localhost:8080/realms/master/protocol/openid-connect/certs,http://localhost:8080/realms/master/protocol/openid-connect/token 
        -javaagent:/opt/ja/jmx_prometheus_javaagent.jar=7071:/opt/config/kafka-config.yml 
        -javaagent:/opt/ja/jolokia-jvm.jar=port=7072,host=*
        -Djavax.net.debug=ssl:trustmanager,session,handshake:verbose


