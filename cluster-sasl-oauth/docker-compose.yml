  keycloak:
    image: keycloak/keycloak:24.0.4
    container_name: ksd-keycloak
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
    ports:
      - "8080:8080"
    command:
      - start-dev
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/8080"]
      start_period: 8s
      interval: 4s
      timeout: 5s
      retries: 4
