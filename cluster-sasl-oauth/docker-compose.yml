#        -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005

      # JVM options for JAAS and allowed URLs
#      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf -Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:8080/realms/kafka/protocol/openid-connect/certs,http://keycloak:8080/realms/kafka/protocol/openid-connect/token
      KAFKA_OPTS: >
        -Dlog4j.rootLogger=DEBUG,STDOUT
        -Dlog4j.logger.org.apache=DEBUG
        -Dlog4j.logger.org.apache.kafka.common.security=DEBUG
        -Dlog4j.logger.org.apache.kafka.common.security.oauthbearer=DEBUG
        -Dlog4j.logger.org.apache.kafka.common.security.authenticator=DEBUG
        -Dlog4j.logger.org.apache.kafka=INFO
        -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf 
        -Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:8080/realms/master/protocol/openid-connect/certs,http://keycloak:8080/realms/master/protocol/openid-connect/token,http://localhost:8080/realms/master/protocol/openid-connect/certs,http://localhost:8080/realms/master/protocol/openid-connect/token

      #KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: "http://keycloak:8080/realms/master/protocol/openid-connect/certs"
      #KAFKA_LISTENER_NAME_EXTERNAL__SASL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: "org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler"

    ports:
      - "9092:9092"
      - "5005:5005"
    volumes:
      - ./secrets/broker_jaas.conf:/etc/kafka/secrets/broker_jaas.conf:ro
