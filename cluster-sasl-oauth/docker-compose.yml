      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: User:kafka-admin;User:kafka-broker;User:app-ui
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512,OAUTHBEARER
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
      KAFKA_AUTO_INCLUDE_JMX_REPORTER: 'false'
      KAFKA_METRIC_REPORTERS: org.apache.kafka.common.metrics.JmxReporter
      KAFKA_LOG4J_OPTS: "-Dlog4j2.configurationFile=file:/opt/config/log4j2.yaml"
      #
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      KAFKA_SASL_OAUTHBEARER_SCOPE_CLAIM: scope
      KAFKA_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: kafka
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_OAUTHBEARER_SUB_CLAIM_NAME: sub
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_EXTERNAL__SSL_SASL_OAUTHBEARER_JWT_VALIDATOR_CLASS: org.apache.kafka.common.security.oauthbearer.BrokerJwtValidator
      KAFKA_SASL_OAUTHBEARER_PRINCIPAL_CLAIM_NAME: client_id
      KAFKA_OPTS: >-
        -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf
        -Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=http://keycloak:8080/realms/master/protocol/openid-connect/certs,http://keycloak:8080/realms/master/protocol/openid-connect/token,http://localhost:8080/realms/master/protocol/openid-connect/certs,http://localhost:8080/realms/master/protocol/openid-connect/token 
        -javaagent:/opt/ja/jmx_prometheus_javaagent.jar=7071:/opt/config/kafka-config.yml 
        -javaagent:/opt/ja/jolokia-jvm.jar=port=7072,host=*
        -Djavax.net.debug=ssl:trustmanager,session,handshake:verbose

