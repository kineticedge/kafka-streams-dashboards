#    listener.name.external.sasl.oauthbearer.jwks.endpoint.url: https://sso-cbc2.cce.af.mil/auth/realms/CBC2/protocol/openid-connect/certs
#    listener.name.external.sasl.oauthbearer.expected.audience: cbc2
