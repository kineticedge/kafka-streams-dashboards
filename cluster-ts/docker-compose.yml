networks:
  default:
    external: true
    name: ksd

volumes:
  minio: {}
  ct0: {}
  bk1: {}
  bk2: {}
  bk3: {}
  bk4: {}

services:

  minio:
    image: quay.io/minio/minio
    hostname: minio
    container_name: ${COMPOSE_PROJECT_NAME}-minio
    ports:
      - "9000:9000"
      - "9091:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      start_period: 5s
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - minio:/data
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=miniominio
    command: server /data --console-address ":9090"

  minio-createbucket:
    image: quay.io/minio/mc
    container_name: ${COMPOSE_PROJECT_NAME}-minio-createbucket
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 admin miniominio && \
      /usr/bin/mc admin user add local minioadmin minioadmin && \
      /usr/bin/mc admin policy attach local consoleAdmin --user minioadmin && \
      /usr/bin/mc mb --ignore-existing local/test-bucket &&
      exit 0
      "

  controller-0:
    platform: ${PLATFORM}
    image: ${IMAGE}:${VERSION}
    hostname: controller-0
    container_name: ${COMPOSE_PROJECT_NAME}-controller-0
    stop_grace_period: 120s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://localhost:7072/jolokia/read/kafka.controller:type=KafkaController,name=ActiveControllerCount/Value' | grep -Eq '\"value\"[[:space:]]*:[[:space:]]*[01]([,}])'"
        ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - ct0:/var/lib/kafka/data
      - ../ja:/opt/ja
      - ./config:/opt/config
      - ./secrets:/etc/kafka/secrets
      - ./plugins:/opt/kafka/plugins
    environment:
      CLUSTER_ID: "0000000000000000000000"
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@controller-0:9093
      KAFKA_NODE_ID: 0
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_OPTS: -javaagent:/opt/ja/jmx_prometheus_javaagent.jar=7071:/opt/config/kafka-config.yml -javaagent:/opt/ja/jolokia-jvm.jar=port=7072,host=*
      KAFKA_LOG4J_OPTS: "-Dlog4j2.configurationFile=file:/opt/config/log4j2.yaml"
      KAFKA_CLASSPATH: "/opt/kafka/libs/*:/opt/kafka/plugins/*"
      #
      ## this one is needed in controller, or you cannot create the topic with this configuration -- unsure (however) if other settings need to be here.
      KAFKA_REMOTE_LOG_STORAGE_SYSTEM_ENABLE: "true"
      KAFKA_REMOTE_LOG_METADATA_MANAGER_CLASS_NAME: "org.apache.kafka.server.log.remote.metadata.storage.TopicBasedRemoteLogMetadataManager"
      #
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 10000
      KAFKA_REMOTE_LOG_MANAGER_TASK_INTERVAL_MS: 5000
      KAFKA_REMOTE_LOG_METADATA_MANAGER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_RLMM_CONFIG_REMOTE_LOG_METADATA_TOPIC_REPLICATION_FACTOR: 1

  broker-1:
    platform: ${PLATFORM}
    image: ${IMAGE}:${VERSION}
    hostname: broker-1
    container_name: ${COMPOSE_PROJECT_NAME}-broker-1
    stop_grace_period: 120s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://localhost:7072/jolokia/read/kafka.server:type=KafkaServer,name=BrokerState/Value' | grep -Eq '\"value\"[[:space:]]*:[[:space:]]*[34]([,}])'"
        ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      minio:
        condition: service_healthy
      controller-0:
        condition: service_healthy
      minio-createbucket:
        condition: service_completed_successfully
    ports:
      - '19092:19092'
      # let this broker act as the load-balancer discovery of the cluster.
      - '9092:19092'
      - '17071:7071'
    volumes:
      - bk1:/var/lib/kafka/data
      # had to use local filesystem, as directory isn't mount, so creates as root and appuser fails due to permission issues
      - ./ts-cache/1:/opt/kafka-tiered-storage-cache
      - ../ja:/opt/ja
      - ./config:/opt/config
      - ./secrets:/etc/kafka/secrets
      - ./plugins:/opt/kafka/plugins
    environment:
      CLUSTER_ID: "0000000000000000000000"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_SECURITY_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@controller-0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 500
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_OPTS: -javaagent:/opt/ja/jmx_prometheus_javaagent.jar=7071:/opt/config/kafka-config.yml -javaagent:/opt/ja/jolokia-jvm.jar=port=7072,host=*
      KAFKA_LOG4J_OPTS: "-Dlog4j.configuration=file:/opt/config/log4j2.yaml"
      #
      KAFKA_CLASSPATH: "/opt/kafka/libs/*:/opt/kafka/plugins/*"
      #
      KAFKA_REMOTE_LOG_STORAGE_SYSTEM_ENABLE: "true"
      KAFKA_REMOTE_LOG_METADATA_MANAGER_CLASS_NAME: "org.apache.kafka.server.log.remote.metadata.storage.TopicBasedRemoteLogMetadataManager"
      #KAFKA_CLASSPATH: "/opt/kafka/libs/*:/opt/kafka/plugins/*"
      KAFKA_REMOTE_LOG_STORAGE_MANAGER_CLASS_PATH: "/opt/kafka/plugins/core-1.1.1/*:/opt/kafka/plugins/s3-1.1.1/*"
      KAFKA_REMOTE_LOG_STORAGE_MANAGER_CLASS_NAME: "io.aiven.kafka.tieredstorage.RemoteStorageManager"
      KAFKA_RSM_CONFIG_CHUNK_SIZE: 4194304 # 4 MiB
      KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_CLASS: "io.aiven.kafka.tieredstorage.fetch.cache.DiskChunkCache"
      KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_PATH: "/opt/kafka-tiered-storage-cache"
      KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_SIZE: 1073741824 # 1 GiB
      KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_PREFETCH_MAX_SIZE: 16777216 # 16 MiB
      KAFKA_RSM_CONFIG_FETCH_CHUNK_CACHE_RETENTION_MS: 600000 # 600000 ms
      KAFKA_RSM_CONFIG_CUSTOM_METADATA_FIELDS_INCLUDE: "REMOTE_SIZE"
      # Storage backend
      KAFKA_RSM_CONFIG_KEY_PREFIX: "tiered-storage-demo/"
      KAFKA_RSM_CONFIG_STORAGE_BACKEND_CLASS: "io.aiven.kafka.tieredstorage.storage.s3.S3Storage"
      KAFKA_RSM_CONFIG_STORAGE_S3_ENDPOINT_URL: "http://minio:9000"
      KAFKA_RSM_CONFIG_STORAGE_S3_BUCKET_NAME: "test-bucket"
      KAFKA_RSM_CONFIG_STORAGE_S3_REGION: "us-east-1"
      KAFKA_RSM_CONFIG_STORAGE_S3_PATH_STYLE_ACCESS_ENABLED: true
      KAFKA_RSM_CONFIG_STORAGE_AWS_ACCESS_KEY_ID: "minioadmin"
      KAFKA_RSM_CONFIG_STORAGE_AWS_SECRET_ACCESS_KEY: "minioadmin"
      #
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 10000
      KAFKA_REMOTE_LOG_MANAGER_TASK_INTERVAL_MS: 5000
      KAFKA_REMOTE_LOG_METADATA_MANAGER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_RLMM_CONFIG_REMOTE_LOG_METADATA_TOPIC_REPLICATION_FACTOR: 1

  broker-2:
