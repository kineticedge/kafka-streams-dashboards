- pattern: kafka.server<type=BrokerTopicMetrics, name=RemoteDeleteLagBytes, topic=(.+)><>Value
- pattern: kafka.server<type=BrokerTopicMetrics, name=RemoteDeleteLagSegments, topic=(.+)><>Value
- pattern: kafka.server<type=BrokerTopicMetrics, name=BuildRemoteLogAuxStateRequestsPerSec, topic=(.+)><>Value
- pattern: kafka.server<type=BrokerTopicMetrics, name=BuildRemoteLogAuxStateErrorsPerSec, topic=(.+)><>Value
- pattern: kafka.server<type=BrokerTopicMetrics, name=RemoteLogSizeComputationTime, topic=(.+)><>Value
